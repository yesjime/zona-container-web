<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zona Container</title>

  <meta name="theme-color" content="#000000" />
  <meta name="description" content="App de pedidos de Zona Container" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icono.png" />
  <link rel="apple-touch-icon" href="./icono.png" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: #111;
      border: 2px solid #ffcc00;
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255, 204, 0, 0.15);
    }

    h1 {
      color: #ffcc00;
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p {
      color: #ddd;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      background: #ffcc00;
      color: #000;
      font-weight: bold;
      text-decoration: none;
      padding: 14px 20px;
      border-radius: 12px;
      margin: 8px 0;
      width: 100%;
      border: none;
      font-size: 1rem;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.95;
    }

    .instalar-info {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🍔 Zona Container</h1>
    <p>App oficial de pedidos de Zona Container.</p>

    <a class="btn" href="https://wa.me/50663281021" target="_blank">
      Hacer pedido por WhatsApp
    </a>

    <button class="btn" id="instalarBtn" style="display:none;">
      Instalar aplicación
    </button>

    <div class="instalar-info">
      Si no aparece el botón, abre el menú de Chrome y toca
      <strong>Agregar a pantalla principal</strong>.
    </div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then(() => console.log("Service Worker registrado"))
          .catch((error) => console.log("Error registrando Service Worker:", error));
      });
    }

    let deferredPrompt;
    const instalarBtn = document.getElementById("instalarBtn");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      instalarBtn.style.display = "inline-block";
    });

    instalarBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const choiceResult = await deferredPrompt.userChoice;
      console.log("Resultado instalación:", choiceResult.outcome);
      deferredPrompt = null;
      instalarBtn.style.display = "none";
    });
  </script>
</body>
</html>
