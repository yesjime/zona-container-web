<!DOCTYPE html>
<html>
<head>
  <title>Zona Container</title>
</head>

<body style="font-family: Arial; padding:20px;">

<h1>🍔 Zona Container</h1>

<h2>Menú</h2>

<button onclick="agregar('Hamburguesa Container',4500)">
Hamburguesa Container ₡4500
</button><br><br>

<button onclick="agregar('Chicken Crispy',3500)">
Chicken Crispy ₡3500
</button><br><br>

<button onclick="agregar('8 Alitas + Papas',5800)">
8 Alitas + Papas ₡5800
</button><br><br>

<button onclick="agregar('Quesadilla Pizzera',4500)">
Quesadilla Pizzera ₡4500
</button>

<h2>Carrito</h2>
<div id="carrito"></div>

<h3 id="total"></h3>

<h2>Datos del cliente</h2>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="telefono" placeholder="Teléfono"><br><br>
<input id="direccion" placeholder="Dirección"><br><br><br>

<button onclick="enviar()">Enviar por WhatsApp</button>

<script>
let carrito = [];
let total = 0;

function agregar(nombre, precio){
  carrito.push({nombre, precio});
  total += precio;

  mostrar();
}

function mostrar(){
  let html = "";
  carrito.forEach(p=>{
    html += p.nombre + " ₡" + p.precio + "<br>";
  });

  document.getElementById("carrito").innerHTML = html;
  document.getElementById("total").innerHTML = "Total: ₡" + total;
}

function enviar(){
  let nombre = document.getElementById("nombre").value;
  let telefono = document.getElementById("telefono").value;
  let direccion = document.getElementById("direccion").value;

  let mensaje = "🍔 Pedido Zona Container\n\n";

  carrito.forEach(p=>{
    mensaje += "- " + p.nombre + " ₡" + p.precio + "\n";
  });

  mensaje += "\nTotal: ₡" + total + "\n\n";
  mensaje += "Cliente: " + nombre + "\n";
  mensaje += "Tel: " + telefono + "\n";
  mensaje += "Dirección: " + direccion;

  let url = "https://wa.me/50663281021?text=" + encodeURIComponent(mensaje);

  window.open(url, "_blank");
}
</script>

</body>
</html>
