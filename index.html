<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zona Container</title>

  <meta name="theme-color" content="#000000" />
  <meta name="description" content="App oficial de pedidos de Zona Container" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icono.png" />
  <link rel="apple-touch-icon" href="./icono.png" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .header h1 {
      color: #ffcc00;
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .header p {
      color: #ccc;
      font-size: 1rem;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #111;
      border: 2px solid #ffcc00;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 0 20px rgba(255, 204, 0, 0.12);
    }

    .card h2 {
      color: #ffcc00;
      margin-bottom: 18px;
      font-size: 1.6rem;
    }

    label {
      display: block;
      margin-bottom: 8px;
      margin-top: 14px;
      font-weight: bold;
      color: #fff;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #1d1d1d;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input[readonly],
    textarea[readonly] {
      background: #181818;
      color: #ddd;
    }

    .btn {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #ffcc00;
      color: #000;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.95;
    }

    .btn-secundario {
      background: #333;
      color: #fff;
      margin-top: 10px;
    }

    .estado {
      margin-top: 12px;
      color: #bbb;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .pedido-item {
      background: #1a1a1a;
      border: 1px solid #333;
      border-left: 4px solid #ffcc00;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .pedido-item h3 {
      color: #ffcc00;
      margin-bottom: 8px;
      font-size: 1.1rem;
    }

    .pedido-item p {
      margin-bottom: 6px;
      color: #ddd;
      line-height: 1.4;
      word-break: break-word;
    }

    .pedido-item small {
      color: #999;
      display: block;
      margin-top: 8px;
    }

    .vacio {
      color: #bbb;
      font-size: 1rem;
      margin-top: 8px;
    }

    .acciones {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .acciones button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-eliminar {
      background: #a32020;
      color: white;
    }

    #instalarBtn {
      display: none;
      margin-top: 14px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #ffcc00;
      color: #000;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    .nota-ubicacion {
      font-size: 0.92rem;
      color: #bbb;
      margin-top: 8px;
      line-height: 1.4;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🍔 Zona Container</h1>
    <p>Haz tu pedido rápido desde la app</p>
  </div>

  <div class="container">
    <div class="card">
      <h2>Nuevo pedido</h2>

      <form id="pedidoForm">
        <label for="formaIngreso">Forma de ingreso</label>
        <select id="formaIngreso">
          <option>App</option>
          <option>WhatsApp</option>
          <option>Llamada</option>
          <option>En local</option>
          <option>Facebook</option>
          <option>Instagram</option>
        </select>

        <label for="tipoServicio">Tipo de servicio</label>
        <select id="tipoServicio">
          <option>Express</option>
          <option>Recoger en local</option>
          <option>Comer en local</option>
        </select>

        <label for="nombreCliente">Nombre del cliente</label>
        <input type="text" id="nombreCliente" placeholder="Ej: Juan Pérez" required />

        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" placeholder="Ej: 8888-8888" required />

        <label for="direccion">Ubicación actual</label>
        <textarea id="direccion" placeholder="Toca el botón para escoger tu ubicación actual" readonly></textarea>
        <button type="button" class="btn btn-secundario" onclick="obtenerUbicacion()">
          Escoger ubicación actual
        </button>
        <div class="nota-ubicacion">
          La app te pedirá permiso para usar tu ubicación y enviarla con el pedido.
        </div>

        <label for="pedido">Pedido</label>
        <textarea id="pedido" placeholder="Ej: 2 hamburguesas tradicionales + papas, 1 orden de alitas BBQ" required></textarea>

        <label for="notas">Notas del pedido</label>
        <textarea id="notas" placeholder="Sin cebolla, salsa aparte, pagar con SINPE, etc."></textarea>

        <button type="submit" class="btn">Guardar pedido</button>
        <button type="button" class="btn btn-secundario" onclick="limpiarFormulario()">Limpiar formulario</button>
        <button type="button" id="instalarBtn">Instalar aplicación</button>

        <div class="estado" id="estadoApp">Listo para registrar pedidos.</div>
      </form>
    </div>

    <div class="card">
      <h2>Pedidos registrados</h2>
      <div id="listaPedidos">
        <p class="vacio">No hay pedidos registrados.</p>
      </div>
    </div>
  </div>

  <script>
    const pedidoForm = document.getElementById("pedidoForm");
    const listaPedidos = document.getElementById("listaPedidos");
    const estadoApp = document.getElementById("estadoApp");

    function obtenerPedidos() {
      return JSON.parse(localStorage.getItem("zonaContainerPedidos")) || [];
    }

    function guardarPedidos(pedidos) {
      localStorage.setItem("zonaContainerPedidos", JSON.stringify(pedidos));
    }

    function renderPedidos() {
      const pedidos = obtenerPedidos();

      if (pedidos.length === 0) {
        listaPedidos.innerHTML = '<p class="vacio">No hay pedidos registrados.</p>';
        return;
      }

      listaPedidos.innerHTML = "";

      pedidos.slice().reverse().forEach((pedido, indexReversed) => {
        const indexReal = pedidos.length - 1 - indexReversed;

        const item = document.createElement("div");
        item.className = "pedido-item";

        item.innerHTML = `
          <h3>${pedido.nombreCliente}</h3>
          <p><strong>Teléfono:</strong> ${pedido.telefono}</p>
          <p><strong>Forma de ingreso:</strong> ${pedido.formaIngreso}</p>
          <p><strong>Tipo de servicio:</strong> ${pedido.tipoServicio}</p>
          <p><strong>Ubicación:</strong> <a href="${pedido.direccion}" target="_blank" style="color:#ffcc00;">Ver ubicación</a></p>
          <p><strong>Pedido:</strong> ${pedido.pedido}</p>
          <p><strong>Notas:</strong> ${pedido.notas || "Sin notas"}</p>
          <small><strong>Fecha:</strong> ${pedido.fecha}</small>
          <div class="acciones">
            <button class="btn-eliminar" onclick="eliminarPedido(${indexReal})">Eliminar</button>
          </div>
        `;

        listaPedidos.appendChild(item);
      });
    }

    function eliminarPedido(index) {
      const pedidos = obtenerPedidos();
      pedidos.splice(index, 1);
      guardarPedidos(pedidos);
      renderPedidos();
      estadoApp.textContent = "Pedido eliminado correctamente.";
    }

    function limpiarFormulario() {
      pedidoForm.reset();
      document.getElementById("direccion").value = "";
      estadoApp.textContent = "Formulario limpio.";
    }

    function obtenerUbicacion() {
      if (!navigator.geolocation) {
        estadoApp.textContent = "Este dispositivo no permite obtener ubicación.";
        return;
      }

      estadoApp.textContent = "Obteniendo ubicación actual...";

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const linkMaps = `https://www.google.com/maps?q=${lat},${lng}`;
          document.getElementById("direccion").value = linkMaps;
          estadoApp.textContent = "Ubicación actual agregada correctamente.";
        },
        function() {
          estadoApp.textContent = "No se pudo obtener la ubicación. Revisa los permisos del navegador.";
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    pedidoForm.addEventListener("submit", function(e) {
      e.preventDefault();

      const nuevoPedido = {
        formaIngreso: document.getElementById("formaIngreso").value,
        tipoServicio: document.getElementById("tipoServicio").value,
        nombreCliente: document.getElementById("nombreCliente").value.trim(),
        telefono: document.getElementById("telefono").value.trim(),
        direccion: document.getElementById("direccion").value.trim(),
        pedido: document.getElementById("pedido").value.trim(),
        notas: document.getElementById("notas").value.trim(),
        fecha: new Date().toLocaleString("es-CR")
      };

      if (!nuevoPedido.nombreCliente || !nuevoPedido.telefono || !nuevoPedido.pedido || !nuevoPedido.direccion) {
        estadoApp.textContent = "Completa nombre, teléfono, pedido y escoge la ubicación actual.";
        return;
      }

      const pedidos = obtenerPedidos();
      pedidos.push(nuevoPedido);
      guardarPedidos(pedidos);

      pedidoForm.reset();
      document.getElementById("direccion").value = "";
      renderPedidos();
      estadoApp.textContent = "Pedido guardado correctamente.";
    });

    renderPedidos();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then(() => console.log("Service Worker registrado"))
          .catch((error) => console.log("Error registrando Service Worker:", error));
      });
    }

    let deferredPrompt;
    const instalarBtn = document.getElementById("instalarBtn");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      instalarBtn.style.display = "block";
    });

    instalarBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      instalarBtn.style.display = "none";
    });
  </script>
</body>
</html>
