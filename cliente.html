<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

// 🔥 CONFIGURACIÓN REAL DE FIREBASE (la tuya ya está bien)
const firebaseConfig = {
  apiKey: "AIzaSyDdT8W7MMLOcMq6ODisH55xX8jdXZu98Y",
  authDomain: "zona-container.firebaseapp.com",
  projectId: "zona-container",
  storageBucket: "zona-container.firebasestorage.app",
  messagingSenderId: "26232579560",
  appId: "1:26232579560:web:0f5122e0f917da2bbf705d"
};

// 🔥 INICIALIZAR FIREBASE
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 MENÚ (puede cambiar después)
const menu = [
  { nombre: "Hamburguesa Container", precio: 4500 },
  { nombre: "Chicken Crispy", precio: 3500 },
  { nombre: "8 Alitas + Papas", precio: 5800 },
  { nombre: "10 Alitas + Papas", precio: 7000 },
  { nombre: "Quesadilla Pizzera", precio: 4500 }
];

let carrito = [];

// 🔥 MOSTRAR MENÚ
function renderMenu() {
  const cont = document.getElementById("menu");
  cont.innerHTML = menu.map((p, i) => `
    <div class="producto">
      ${p.nombre} - ₡${p.precio}
      <button onclick="add(${i})">+</button>
    </div>
  `).join("");
}

// 🔥 MOSTRAR CARRITO
function renderCarrito() {
  const cont = document.getElementById("carrito");
  const total = carrito.reduce((a, b) => a + b.precio * b.cantidad, 0);

  cont.innerHTML = carrito.map((p, i) => `
    <div class="carrito-item">
      ${p.cantidad} x ${p.nombre}
      <button onclick="remove(${i})">x</button>
    </div>
  `).join("");

  document.getElementById("total").innerText = "Total: ₡" + total;
}

// 🔥 AGREGAR PRODUCTO
window.add = function(i) {
  const prod = menu[i];
  const ex = carrito.find(p => p.nombre === prod.nombre);
  if (ex) ex.cantidad++;
  else carrito.push({ ...prod, cantidad: 1 });
  renderCarrito();
}

// 🔥 ELIMINAR PRODUCTO
window.remove = function(i) {
  carrito.splice(i, 1);
  renderCarrito();
}

// 🔥 CAMBIAR SERVICIO
window.cambiarServicio = function() {
  const t = document.getElementById("tipoServicio").value;
  document.getElementById("ubicacionBox").style.display = t === "Express" ? "block" : "none";
  document.getElementById("horaBox").style.display = t === "Local" ? "block" : "none";
}

// 🔥 GENERAR NÚMERO DE PEDIDO
async function siguienteNumero() {
  const ref = doc(db, "config", "numero");
  const snap = await getDoc(ref);

  let num = 0;
  if (snap.exists()) num = snap.data().valor;

  num++;
  await setDoc(ref, { valor: num });

  return num;
}

// 🔥 ENVIAR PEDIDO
window.enviarPedido = async function() {

  const cliente = document.getElementById("cliente").value;

  if (!cliente) {
    alert("Ingrese nombre");
    return;
  }

  if (carrito.length === 0) {
    alert("Agregue productos");
    return;
  }

  const numero = await siguienteNumero();

  const pedido = {
    id: Date.now(),
    numero,
    cliente,
    telefono: document.getElementById("telefono").value,
    tipoServicio: document.getElementById("tipoServicio").value,
    ubicacion: document.getElementById("ubicacion").value,
    hora: document.getElementById("hora").value,
    notas: document.getElementById("notas").value,
    productos: carrito,
    total: carrito.reduce((a,b)=>a+b.precio*b.cantidad,0),
    estado: "Nuevo",
    pagado: false
  };

  await setDoc(doc(db, "pedidos", String(pedido.id)), pedido);

  alert("Pedido enviado #" + numero);

  carrito = [];
  renderCarrito();
}

// 🔥 INICIALIZAR
renderMenu();
renderCarrito();

</script>
